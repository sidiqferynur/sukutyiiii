<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Catcher - Full Game</title>
    <style>
        body {
            background: linear-gradient(135deg, #0b0b16, #1a1a3a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
            color: #00ffcc;
        }
        .score-board {
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #scoreVal {
            color: #ff007f;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
        }
        .canvas-container {
            position: relative;
        }
        canvas {
            border: 3px solid #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
            background-color: #0d0d1f;
            border-radius: 8px;
        }
        .btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 255, 204, 0.6);
        }
        .instruction {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>Space Catcher</h1>
    <div class="score-board">SKOR: <span id="scoreVal">0</span> | NYAWA: <span id="livesVal">3</span></div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="450" height="550"></canvas>
        <button id="startBtn" class="btn" onclick="startGame()">MULAI GAME</button>
    </div>

    <div class="instruction">Gerakkan <b>Mouse</b> atau gunakan tombol <b>Panah Kiri & Kanan</b> untuk bermain.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const livesElement = document.getElementById("livesVal");
        const startBtn = document.getElementById("startBtn");

        let score = 0;
        let lives = 3;
        let gameActive = false;
        let targetSpeed = 4;
        let particles = [];

        // =========================================================================
        // ASET KARAKTER & LOGO (TERTULIS LANGSUNG DALAM KODE / INLINE SVG)
        // =========================================================================
        
        // Karakter 1: Astronot Penangkap (Player)
        const imgPlayer = new Image();
        imgPlayer.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='35' r='20' fill='%23ffffff'/><rect x='42' y='27' width='16' height='12' rx='3' fill='%2300ccff'/><rect x='30' y='55' width='40' height='35' rx='10' fill='%23dddddd'/><circle cx='38' cy='70' r='5' fill='%23ff0055'/><circle cx='62' cy='70' r='5' fill='%2300ffaa'/></svg>";

        // Karakter 2: Serpihan Bintang Efek Ledakan (Particle)
        const imgParticle = new Image();
        imgParticle.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><polygon points='25,1 32,18 50,20 36,32 40,50 25,40 10,50 14,32 0,20 18,18' fill='%23ffcc00'/></svg>";

        // Karakter 3: Bintang Jatuh Bersinar (Target)
        const imgTarget = new Image();
        imgTarget.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><circle cx='30' cy='30' r='22' fill='%23ff0055'/><circle cx='30' cy='30' r='15' fill='%23ff77aa'/><polygon points='30,12 34,22 45,22 36,28 40,38 30,32 20,38 24,28 15,22 26,22' fill='%23ffffff'/></svg>";

        // =========================================================================

        let player = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 95,
            width: 80,
            height: 80,
            speed: 9,
            movingLeft: false,
            movingRight: false
        };

        let target = {
            x: Math.random() * (canvas.width - 50),
            y: -60,
            width: 50,
            height: 50
        };

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 15 + 10;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.alpha = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.04;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.drawImage(imgParticle, this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y));
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') player.movingLeft = true;
            if (e.key === 'ArrowRight') player.movingRight = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') player.movingLeft = false;
            if (e.key === 'ArrowRight') player.movingRight = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            player.x = mouseX - player.width / 2;
        });

        function updateGame() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pergerakan Keyboard
            if (player.movingLeft && player.x > 0) player.x -= player.speed;
            if (player.movingRight && player.x < canvas.width - player.width) player.x += player.speed;

            // Batas Player
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Gambar Player (Astronot)
            ctx.drawImage(imgPlayer, player.x, player.y, player.width, player.height);

            // Gambar & Gerakan Target (Bintang Neon)
            target.y += targetSpeed;
            ctx.drawImage(imgTarget, target.x, target.y, target.width, target.height);

            // Animasi Partikel Ledakan
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.alpha <= 0) particles.splice(index, 1);
            });

            // Deteksi Tabrakan
            if (target.y + target.height >= player.y + 10 &&
                target.x + target.width >= player.x + 10 &&
                target.x <= player.x + player.width - 10 &&
                target.y <= player.y + player.height) {
                
                createExplosion(target.x + target.width / 2, target.y + target.height / 2);
                score += 10;
                scoreElement.textContent = score;
                
                target.y = -60;
                target.x = Math.random() * (canvas.width - target.width);
                targetSpeed += 0.3; // Semakin tinggi skor, objek jatuh semakin cepat!
            }

            // Jika Target Lolos Jatuh ke Bawah
            if (target.y > canvas.height) {
                lives--;
                livesElement.textContent = lives;
                target.y = -60;
                target.x = Math.random() * (canvas.width - target.width);

                if (lives <= 0) {
                    gameOver();
                }
            }

            requestAnimationFrame(updateGame);
        }

        function startGame() {
            score = 0;
            lives = 3;
            targetSpeed = 4;
            particles = [];
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            target.y = -60;
            target.x = Math.random() * (canvas.width - target.width);
            
            startBtn.style.display = "none";
            gameActive = true;
            updateGame();
        }

        function gameOver() {
            gameActive = false;
            ctx.fillStyle = "rgba(11, 11, 22, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff007f";
            ctx.font = "bold 36px Arial";
            ctx.textAlign = "center";
            ctx.fillText("MISSION FAILED", canvas.width / 2, canvas.height / 2 - 40);
            
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Skor Akhir: " + score, canvas.width / 2, canvas.height / 2 + 10);

            startBtn.textContent = "COBA LAGI";
            startBtn.style.display = "block";
        }

        // Tampilan Awal
        ctx.fillStyle = "#0d0d1f";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
