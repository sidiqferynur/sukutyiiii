<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Ular Jadul dengan Foto</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #111;
        }
        .score {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Game Ular (Snake Picture Edition)</h1>
    <div class="score">Skor: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const grid = 20;
        let count = 0;
        let score = 0;

        // --- LOADING GAMBAR/FOTO ---
        const imgKepala = new Image();
        imgKepala.src = 'URL_FOTO_1'; // <- Ganti dengan URL/Link Foto 1 Kamu

        const imgBadan = new Image();
        imgBadan.src = 'URL_FOTO_2'; // <- Ganti dengan URL/Link Foto 2 Kamu

        const imgApel = new Image();
        imgApel.src = 'URL_FOTO_3'; // <- Ganti dengan URL/Link Foto 3 Kamu
        // ----------------------------

        let snake = {
            x: 160,
            y: 160,
            dx: grid,
            dy: 0,
            cells: [],
            maxCells: 4
        };

        let apple = {
            x: 320,
            y: 320
        };

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function loop() {
            requestAnimationFrame(loop);

            if (++count < 6) {
                return;
            }
            count = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gerakkan ular
            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - grid;
            else if (snake.x >= canvas.width) snake.x = 0;
            
            if (snake.y < 0) snake.y = canvas.height - grid;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});

            if (snake.cells.length > snake.maxCells) {
                snake.cells.pop();
            }

            // --- GAMBAR APEL (Menggunakan Foto 3) ---
            ctx.drawImage(imgApel, apple.x, apple.y, grid, grid);

            // --- GAMBAR ULAR ---
            snake.cells.forEach(function(cell, index) {
                
                if (index === 0) {
                    // Jika index 0, ini adalah KEPALA (Menggunakan Foto 1)
                    ctx.drawImage(imgKepala, cell.x, cell.y, grid, grid);
                } else {
                    // Sisanya adalah BADAN (Menggunakan Foto 2)
                    ctx.drawImage(imgBadan, cell.x, cell.y, grid, grid);
                }

                // Ular memakan apel
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    scoreElement.textContent = score;

                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }

                // Cek Game Over
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        snake.x = 160;
                        snake.y = 160;
                        snake.cells = [];
                        snake.maxCells = 4;
                        snake.dx = grid;
                        snake.dy = 0;
                        score = 0;
                        scoreElement.textContent = score;
                        apple.x = getRandomInt(0, 20) * grid;
                        apple.y = getRandomInt(0, 20) * grid;
                    }
                }
            });
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft' && snake.dx === 0) {
                snake.dx = -grid;
                snake.dy = 0;
            }
            else if (e.key === 'ArrowUp' && snake.dy === 0) {
                snake.dy = -grid;
                snake.dx = 0;
            }
            else if (e.key === 'ArrowRight' && snake.dx === 0) {
                snake.dx = grid;
                snake.dy = 0;
            }
            else if (e.key === 'ArrowDown' && snake.dy === 0) {
                snake.dy = grid;
                snake.dx = 0;
            }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
