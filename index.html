<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukutyi Adventure - Lebih Santai</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 800px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 450,
        height: 800,
        parent: 'game-container',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 900 }, // DIKURANGI: Biar jatuhnya lebih lambat dan melayang
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);
    let player;
    let obstacles;
    let score = 0;
    let scoreText;
    let isGameOver = false;
    let spawnTimer;

    function preload() {}

    function create() {
        // Background & Tanah
        this.add.rectangle(225, 400, 450, 800, 0x87CEEB); 
        this.add.rectangle(225, 750, 450, 100, 0x4d2922); 
        
        let ground = this.physics.add.staticGroup();
        let groundLine = this.add.rectangle(225, 710, 450, 20, 0x228B22);
        ground.add(groundLine);

        // Karakter Utama: "Sukutyi"
        let playerBody = this.add.rectangle(0, 0, 40, 50, 0xFF8C00);
        let eye = this.add.rectangle(10, -10, 8, 8, 0x000000);
        let mouth = this.add.rectangle(10, 5, 12, 4, 0x000000);
        
        let playerContainer = this.add.container(100, 650, [playerBody, eye, mouth]);
        this.physics.add.existing(playerContainer);
        player = playerContainer;
        player.body.setCollideWorldBounds(true);
        
        // Memperkecil hitbox pemain agar tidak gampang kesenggol musuh
        player.body.setSize(30, 45); 

        this.physics.add.collider(player, ground);

        // Grup Rintangan
        obstacles = this.physics.add.group();
        this.physics.add.collider(obstacles, ground);

        // Deteksi tabrakan
        this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

        // Skor
        scoreText = this.add.text(20, 20, 'Skor: 0', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 4 });

        // Kontrol Sentuh HP (Lompat)
        this.input.on('pointerdown', function () {
            // Pemain bisa melompat jika menyentuh tanah
            if (player.body.touching.down || player.y >= 680) {
                player.body.setVelocityY(-480); // DISESUAIKAN: Lompatan lebih pas dengan gravitasi baru
            }
            
            if (isGameOver) {
                resetGame.call(this);
            }
        }, this);

        // Memunculkan rintangan secara berkala
        spawnTimer = this.time.addEvent({
            delay: 2200, // DIUTAK-ATIK: Jeda antar musuh lebih lama (2.2 detik), tidak beruntun
            callback: spawnObstacle,
            callbackScope: this,
            loop: true
        });
    }

    function update() {
        if (isGameOver) return;

        obstacles.getChildren().forEach(function(obstacle) {
            // DIKURANGI: Kecepatan awal musuh jadi -180 (sebelumnya -250), naiknya skor juga tidak bikin secepat dulu
            obstacle.body.setVelocityX(-180 - (score * 2)); 
            
            if (obstacle.x < -50 && !obstacle.passed) {
                obstacle.passed = true;
                score += 10;
                scoreText.setText('Skor: ' + score);
            }
        });
    }

    function spawnObstacle() {
        if (isGameOver) return;

        // Musuh (Kotak Ungu)
        let obsBody = this.add.rectangle(0, 0, 30, 40, 0x8A2BE2);
        let obsEye = this.add.rectangle(-5, -5, 6, 6, 0xFFFFFF);
        let obstacle = this.add.container(500, 685, [obsBody, obsEye]);
        
        this.physics.add.existing(obstacle);
        
        // Memperkecil hitbox musuh agar adil bagi pemain
        obstacle.body.setSize(20, 35);
        
        obstacles.add(obstacle);
        
        obstacle.body.setCollideWorldBounds(false);
        obstacle.body.setImmovable(true);
        obstacle.body.allowGravity = false;
    }

    function hitObstacle(player, obstacle) {
        this.physics.pause();
        isGameOver = true;
        spawnTimer.destroy();
        
        this.add.text(125, 350, 'GAME OVER', { fontSize: '40px', fill: '#ff0000', fontWeight: 'bold', stroke: '#fff', strokeThickness: 4 });
        this.add.text(110, 420, 'Ketuk layar untuk main lagi', { fontSize: '18px', fill: '#fff' });
    }

    function resetGame() {
        isGameOver = false;
        score = 0;
        this.scene.restart();
    }
</script>

</body>
</html>
